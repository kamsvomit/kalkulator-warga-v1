<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Warga</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash-screen" class="fixed inset-0 z-[9999] flex items-center justify-center" style="background: linear-gradient(135deg, #ef4444, #f97316, #ef4444); background-size: 300% 300%; animation: splashGrad 3s ease infinite;">
      <style>
        @keyframes splashGrad {
          0%, 100% { background-position: 0% 50%; }
          50% { background-position: 100% 50%; }
        }
        @keyframes splashTextFade {
          0% { opacity: 0; transform: translateY(8px); }
          100% { opacity: 1; transform: translateY(0); }
        }
        #splash-title { animation: splashTextFade 0.4s ease 0.3s both; }
        #splash-sub { animation: splashTextFade 0.4s ease 0.5s both; }
      </style>
      <div class="text-center">
        <h1 id="splash-title" class="text-3xl font-black text-white uppercase tracking-tighter">Kalkulator Warga</h1>
        <p id="splash-sub" class="text-white font-bold uppercase tracking-[0.3em] text-[10px] mt-2 opacity-70">Memuat Layanan Digital...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
